kind = "web"
previewPath = "/"
title = "Real Estate & Loan Officer Website"
version = "1.0.0"
id = "artifacts/realty-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25425

[services.development]
run = "pnpm --filter @workspace/realty-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/realty-site", "run", "build" ]
publicDir = "artifacts/realty-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25425"
BASE_PATH = "/"
