[build]
  command = "pnpm install && pnpm --filter @workspace/realty-site run build && pnpm --filter @workspace/api-server run build:netlify"
  publish = "artifacts/realty-site/dist/public"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10"
  # Frozen lockfile bypasses minimumReleaseAge checks and gives reproducible builds
  NETLIFY_USE_PNPM_FROZEN_LOCKFILE = "1"
  BASE_PATH = "/"
  PORT = "3000"
  NODE_ENV = "production"

# Pre-built functions — esbuild bundles them during the build command above.
# node_bundler = "none" tells Netlify to deploy the .mjs files as-is (no re-bundling).
[functions]
  directory = "netlify/functions"
  node_bundler = "none"

# Route all /api/* traffic to the Netlify Function (runs the full Express app)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# SPA catch-all — must come AFTER the /api/* rule
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
