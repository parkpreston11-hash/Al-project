[build]
  command = "pnpm install && pnpm --filter @workspace/realty-site run build"
  publish = "artifacts/realty-site/dist/public"

[build.environment]
  NODE_VERSION = "20"
  BASE_PATH = "/"
  PORT = "3000"

# API calls must 404 (no backend on Netlify) — must be declared BEFORE the SPA catch-all
# so they don't get served index.html as a 200, which breaks customFetch parsing
[[redirects]]
  from = "/api/*"
  to = "/index.html"
  status = 404
  force = true

# SPA catch-all: every non-asset path serves index.html so client-side routing works
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
